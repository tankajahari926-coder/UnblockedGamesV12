<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Games - Unblocked Games</title>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f172a; color: white; font-family: sans-serif;">
        <div style="text-align: center;">
          <h2 style="margin-bottom: 10px;">Loading Portal Games...</h2>
          <p style="color: #64748b;">If this takes too long, check your browser console for errors.</p>
        </div>
      </div>
    </div>
    <noscript>
      <div style="text-align: center; padding: 50px; background: #0f172a; color: white; height: 100vh;">
        <h1>JavaScript Required</h1>
        <p>Please enable JavaScript to play these games.</p>
      </div>
    </noscript>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="padding: 20px; color: white; background: #ef4444; border-radius: 8px; margin: 20px; font-family: sans-serif;">' +
            '<h1 style="font-size: 20px; margin-bottom: 10px;">JavaScript Error</h1>' +
            '<p>The application failed to start. This might be due to a script loading error.</p>' +
            '<pre style="margin-top: 10px; font-size: 12px; opacity: 0.8; overflow: auto;">' + msg + '\n' + url + ':' + lineNo + '</pre>' +
            '</div>';
        }
        return false;
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
